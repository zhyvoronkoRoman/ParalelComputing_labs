apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    app: crypto-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-redis
  template:
    metadata:
      labels:
        app: crypto-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: crypto-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
